# TradeReporter nginx config - generated from deploy.config by apply-config.sh
# Values: DOMAIN_NAME=opticanvas.com SERVER_IP=205.198.68.58

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name opticanvas.com www.opticanvas.com;

    root /root/TradeReporter/frontend/build;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }
}

# HTTPS: certbot --nginx -d opticanvas.com -d www.opticanvas.com
